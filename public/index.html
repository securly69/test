<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MadEgg Proxy</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Navbar -->
  <div class="f-nav">
    <div id="icon-container">
      <a class="icon" href="/./">
        <img alt="nav" id="INImg" src="https://png.pngtree.com/png-clipart/20230520/original/pngtree-angry-eggs-png-image_9166378.png" />
      </a>
    </div>
    <div class="f-nav-right">
      <a class="navbar-link" href="/./settings">
        <i class="fa-solid fa-gear navbar-icon settings-icon"></i>
        <an>Set</an><an>tings</an>
      </a>
    </div>
  </div>

  <!-- Time and Date -->
  <div class="time-date" id="time-date"></div>

  <!-- Search Bar & Bookmarks -->
  <div class="search-container">
    <form id="search-form">
      <input type="text" class="search-bar" id="search-input" placeholder="Search..." />
    </form>

    <!-- Bookmarks -->
    <div class="bookmarks" id="bookmarks">
      <a href="/proxy?url=https://www.youtube.com" class="bookmark">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
                <span>YouTube</span>
            </a>
            <a href="/proxy?url=https://twitter.com" class="bookmark">
                <img src="https://cdn.freebiesupply.com/logos/large/2x/twitter-3-logo-png-transparent.png" alt="Twitter">
                <span>Twitter</span>
            </a>
            <a href="/proxy?url=https://discord.com" class="bookmark">
                <img src="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord">
                <span>Discord</span>
            </a>
            <a href="/proxy?url=https://www.nvidia.com/en-us/geforce-now/" class="bookmark">
                <img src="https://www.nesabamedia.com/wp-content/uploads/2022/06/GeForce-NOW-Logo-1.png" alt="GeForce Now">
                <span>GeForce Now</span>
            </a>
    </div>

    <!-- Add Bookmark Modal -->
    <div class="add-bookmark" id="add-bookmark">+ Add Bookmark</div>
    <div class="add-bookmark-modal" id="add-bookmark-modal">
      <input type="text" id="bookmark-name" placeholder="Bookmark Name" />
      <input type="text" id="bookmark-url" placeholder="Bookmark URL" />
      <button id="save-bookmark">Save</button>
    </div>
  </div>

  <!-- Top Right Menu -->
  <div class="top-right-menu">
    <button class="menu-button" id="about-blank-cloaker">Search History Spammer</button>
  </div>

  <script>
    // Time and Date
    function updateTime() {
      const now = new Date();
      const timeString = now.toLocaleTimeString();
      const dateString = now.toLocaleDateString();
      document.getElementById('time-date').textContent = `${dateString} ${timeString}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Add Bookmark Modal
    const addBookmarkButton = document.getElementById('add-bookmark');
    const addBookmarkModal = document.getElementById('add-bookmark-modal');
    const saveBookmarkButton = document.getElementById('save-bookmark');
    const bookmarksContainer = document.getElementById('bookmarks');

    addBookmarkButton.addEventListener('click', () => {
      addBookmarkModal.style.display = 'flex';
    });

    saveBookmarkButton.addEventListener('click', () => {
      const name = document.getElementById('bookmark-name').value;
      const url = document.getElementById('bookmark-url').value;
      if (name && url) {
        const bookmark = document.createElement('a');
        bookmark.href = `/proxy?url=${url}`;
        bookmark.classList.add('bookmark');
        bookmark.target = '_blank';
        bookmark.innerHTML = `<img src="https://www.google.com/s2/favicons?sz=64&domain_url=${url}" alt="${name}">
                              <span>${name}</span>`;
        bookmarksContainer.appendChild(bookmark);
        addBookmarkModal.style.display = 'none';
        document.getElementById('bookmark-name').value = '';
        document.getElementById('bookmark-url').value = '';
      }
    });

    // Search Form Handling (Through Proxy)
    const searchForm = document.getElementById('search-form');
    searchForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const searchQuery = document.getElementById('search-input').value;
      if (searchQuery) {
        window.open(`/proxy?url=${encodeURIComponent(searchQuery)}`, '_blank');
      }
    });

    // Search History Spammer
    const aboutBlankCloakerButton = document.getElementById('about-blank-cloaker');
    aboutBlankCloakerButton.addEventListener('click', () => {
      SHS();
    });

    function SHS() {
      const urls = [
        "https://docs.google.com", "https://drive.google.com", "https://classroom.google.com",
        "https://slides.google.com", "https://google.com", "https://youtube.com", "https://www.edpuzzle.com",
        "https://www.gmail.com", "https://sheets.google.com"
      ];
      urls.forEach(url => {
        window.open(`/proxy?url=${encodeURIComponent(url)}`);
      });
    }
  </script>
</body>
</html>
