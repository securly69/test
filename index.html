<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadEgg Proxy</title>
    <style>
        /* Style definitions as before */
    </style>
</head>
<body>
    <div class="time-date" id="time-date"></div>

    <div class="search-container">
        <form action="javascript:void(0);" id="search-form">
            <input type="text" class="search-bar" id="search-url" placeholder="Search..." />
        </form>

        <div class="bookmarks" id="bookmarks">
            <!-- Bookmarks here -->
        </div>

        <div class="add-bookmark" id="add-bookmark">+ Add Bookmark</div>
    </div>

    <div class="embed-container">
        <embed id="embedded-content" src="" width="100%" height="100%" />
    </div>

    <script>
        // JavaScript logic for time updates, bookmark handling, and embedding content dynamically
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            const dateString = now.toLocaleDateString();
            document.getElementById('time-date').textContent = `${dateString} ${timeString}`;
        }

        setInterval(updateTime, 1000);
        updateTime();

        // Handle the search form submission
        document.getElementById('search-form').addEventListener('submit', function() {
            const url = document.getElementById('search-url').value;
            if (url) {
                // Send the URL to the backend to get the embed content
                fetch(`/api/render?url=${encodeURIComponent(url)}`)
                    .then(response => response.json())
                    .then(data => {
                        const embedElement = document.getElementById('embedded-content');
                        embedElement.src = data.embedUrl;
                    })
                    .catch(error => console.error('Error loading embedded content:', error));
            }
        });
    </script>
</body>
</html>
